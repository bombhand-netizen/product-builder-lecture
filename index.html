<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 (강아지 vs 고양이)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">다크 모드</button>
    </div>
    <div class="container">
        <h1>나의 동물상 테스트</h1>
        <p class="subtitle">강아지일까, 고양이일까? 사진을 올려보세요!</p>
        
        <div class="upload-section">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <button id="upload-btn">사진 업로드</button>
            <div id="image-preview-container">
                <img id="image-preview" src="#" alt="미리보기" style="display: none;">
            </div>
        </div>

        <div id="loading" style="display: none;">
            <p>분석 중...</p>
        </div>

        <div id="result-section" style="display: none;">
            <h2 id="result-message"></h2>
            <div id="label-container"></div>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--number-border);">

        <div class="contact-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/myklbvgj" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--number-border);">

        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-6qfhtmxfwr.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
