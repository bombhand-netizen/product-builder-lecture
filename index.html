<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Lottery Number Picker</h1>
        <div class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--number-border);">

        <div class="contact-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/myklbvgj" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
